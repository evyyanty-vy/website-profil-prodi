<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Profil Program Studi{% endblock %} | {{ prodi.nama }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }

    body {
      background-color: #f7f3f0;
      font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
      color: #2d2d2d;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      background-color: #1c1c2e !important;
      padding: 14px 0;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 1rem;
      color: #e8c9b8 !important;
      letter-spacing: 0.3px;
    }
    .navbar-brand i { color: #d4956a; }
    .nav-link {
      color: rgba(255,255,255,0.75) !important;
      font-weight: 500;
      font-size: 0.92rem;
      padding: 6px 14px !important;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .nav-link:hover {
      color: #e8c9b8 !important;
      background-color: rgba(255,255,255,0.07);
    }
    .nav-link.active {
      color: #d4956a !important;
      background-color: rgba(212,149,106,0.1);
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      background: linear-gradient(135deg, #1c1c2e 0%, #2d2640 100%);
      color: white;
      padding: 52px 0 42px;
      margin-bottom: 44px;
      position: relative;
      overflow: hidden;
    }
    .page-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #d4956a, #e8c9b8, #d4956a);
    }
    .page-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .page-header p { color: rgba(255,255,255,0.6); }

    /* ===== CARD ===== */
    .card {
      border: 1px solid #ede8e3 !important;
      border-radius: 16px !important;
      background-color: #ffffff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.05);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 32px rgba(212,149,106,0.15);
      border-color: #e8c9b8 !important;
    }

    /* ===== CARD STAT ===== */
    .card-stat {
      background: linear-gradient(135deg, #1c1c2e 0%, #2d2640 100%) !important;
      border: none !important;
      color: white !important;
    }
    .card-stat h3 { color: #e8c9b8 !important; font-size: 2rem; }
    .card-stat p  { color: rgba(255,255,255,0.65) !important; font-size: 0.85rem; letter-spacing: 0.5px; text-transform: uppercase; }
    .card-stat i  { color: #d4956a; }
    .card-stat:hover {
      box-shadow: 0 10px 32px rgba(28,28,46,0.25) !important;
      border-color: transparent !important;
    }

    /* ===== TOMBOL ===== */
    .btn-utama {
      background: linear-gradient(135deg, #d4956a, #c47a52);
      border: none;
      color: white;
      font-weight: 600;
      border-radius: 10px;
      padding: 11px 26px;
      font-size: 0.92rem;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(212,149,106,0.35);
    }
    .btn-utama:hover {
      background: linear-gradient(135deg, #c47a52, #b36840);
      color: white;
      box-shadow: 0 6px 18px rgba(212,149,106,0.45);
      transform: translateY(-1px);
    }
    .btn-outline-utama {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      font-weight: 600;
      border-radius: 10px;
      padding: 11px 26px;
      font-size: 0.92rem;
      transition: all 0.2s;
    }
    .btn-outline-utama:hover {
      background: rgba(255,255,255,0.1);
      border-color: white;
      color: white;
    }

    /* ===== TABEL ===== */
    .table { color: #2d2d2d !important; }
    .table thead th {
      background-color: #1c1c2e !important;
      color: #e8c9b8 !important;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: none !important;
      padding: 14px 16px;
    }
    .table tbody tr { border-color: #f0ebe6; }
    .table tbody tr:hover { background-color: #fdf6f2 !important; }
    .table tbody td { padding: 13px 16px; vertical-align: middle; }

    /* ===== BADGE STATUS ===== */
    .badge-aktif  { background-color: #2d6a4f; color: white; border-radius: 8px; padding: 5px 12px; }
    .badge-cuti   { background-color: #b07d2a; color: white; border-radius: 8px; padding: 5px 12px; }
    .badge-lulus  { background-color: #1a5f7a; color: white; border-radius: 8px; padding: 5px 12px; }
    .badge-keluar { background-color: #7a2020; color: white; border-radius: 8px; padding: 5px 12px; }

    /* ===== BADGE BIDANG DOSEN ===== */
    .badge.bg-primary {
      background: linear-gradient(135deg, #d4956a, #c47a52) !important;
      color: white !important;
      font-weight: 500;
      border-radius: 8px;
      padding: 5px 12px;
    }

    /* ===== BORDER AKSEN ===== */
    .border-aksen { border-left: 4px solid #d4956a !important; }
    .border-aksen-soft { border-left: 4px solid #e8c9b8 !important; }

    /* ===== TEXT WARNA ===== */
    .text-aksen  { color: #d4956a !important; }
    .text-aksen2 { color: #c47a52 !important; }
    .text-primary { color: #d4956a !important; }

    /* ===== DIVIDER ===== */
    .divider-aksen {
      height: 3px;
      background: linear-gradient(90deg, #d4956a, #e8c9b8, transparent);
      border: none;
      border-radius: 4px;
      margin: 28px 0;
    }

    /* ===== FOOTER ===== */
    .footer {
      background-color: #1c1c2e;
      color: rgba(255,255,255,0.55);
      padding: 32px 0;
      margin-top: 70px;
      border-top: 3px solid #d4956a;
    }
    .footer strong { color: #e8c9b8; }
    .footer .small { font-size: 0.8rem; }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="bi bi-mortarboard-fill me-2"></i>{{ prodi.nama }}
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/profil' %}active{% endif %}" href="/profil">
              <i class="bi bi-info-circle me-1"></i>Profil Prodi
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/dosen' %}active{% endif %}" href="/dosen">
              <i class="bi bi-person-badge me-1"></i>Daftar Dosen
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/mahasiswa' %}active{% endif %}" href="/mahasiswa">
              <i class="bi bi-people me-1"></i>Daftar Mahasiswa
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <!-- FOOTER -->
  <footer class="footer text-center">
    <div class="container">
      <p class="mb-1">
        <i class="bi bi-mortarboard-fill me-1" style="color:#d4956a;"></i>
        <strong>{{ prodi.nama }}</strong>
      </p>
      <p class="mb-1">{{ prodi.fakultas }}, {{ prodi.universitas }}</p>
      <p class="mb-0 small">&copy; 2024 &mdash; Dibuat untuk Tugas 4 Pemrograman Web</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
